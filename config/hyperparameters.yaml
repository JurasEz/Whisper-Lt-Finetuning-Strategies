experiment:
  project_name: "bakis"
  model_name: "openai/whisper-large-v3"
  language: "lithuanian"
  task: "transcribe"
  sampling_rate_hz: 16000
  data_root: "data/liepa2-corpus/data"
  recording_prefixes: ["L_S", "R_S"]
  prepared_data_dir: "prepared_data/ls_rs_spontaneous_norm_80_10_10"
  output_root: "outputs"
  results_root: "results"

splits:
  train_ratio: 0.8
  valid_ratio: 0.1
  test_ratio: 0.1
  split_seed: 42

segment_processing:
  min_duration_sec: 0.4
  max_duration_sec: 30.0
  merge_segments: true
  target_merged_duration_sec: 25.0
  max_gap_for_merge_sec: 0.6
  remove_noise_labels:
    - "+BREATH+"
    - "+COUGH+"
    - "+LAUGH+"
    - "+SMACK+"
    - "+AH+"
    - "+EH+"
    - "+MM+"
    - "+GARBAGE+"
    - "+NOISE+"

metrics:
  compute: ["wer", "cer", "sem", "ped", "kr"]
  primary_metric: "wer"

repeat_policy:
  tuning_seed: 42
  seed_final_repeats: [42, 52, 62]

common_hyperparameters:
  max_epochs: 1
  early_stopping_patience_evals: 3
  scheduler: "linear"
  warmup_ratio: 0.05
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  gradient_checkpointing: true
  mixed_precision: "fp16_if_cuda"
  max_output_length: 225
  eval_steps: 200
  save_steps: 200
  logging_steps: 25
  save_total_limit: 2
  best_model_metric: "eval_loss"
  greater_is_better: false
  max_steps: -1
  tune_train_subset_size: 5000
  tune_valid_subset_size: 400
  tune_compute_test_metrics: false
  auto_resume: false

common_search_space:
  warmup_ratio: [0.05, 0.1]
  scheduler: ["linear", "constant_with_warmup"]

optimization:
  framework: "optuna"
  objective_metric: "best_eval_wer"
  direction: "minimize"
  sampler: "tpe"
  pruner: "hyperband"
  storage: "sqlite:///results/optuna/studies.db"
  study_name_prefix: "bakis_whisper_v3"
  final_repeats_metric_set: ["wer", "cer", "sem", "ped", "kr"]
  trials_per_strategy:
    full_ft: 3
    selective_ft: 4
    lora_ft: 6

strategies:
  full_ft:
    description: "Pilnas fine-tuning: apmokomi visi modelio parametrai."
    fixed:
      trainable_scope: "all_parameters"
      model_weight_quantization: null
      optimizer: "adamw_torch"
    defaults:
      learning_rate: 1.0e-5
      weight_decay: 0.01
    search_space:
      learning_rate: [5.0e-6, 1.0e-5, 2.0e-5, 3.0e-5]
      weight_decay: [0.0, 0.01, 0.05]

  selective_ft:
    description: "Dalinis fine-tuning: užšaldoma dalis sluoksnių, apmokoma tik likusi modelio dalis."
    fixed:
      strategy_variant: "freeze_lower_encoder_layers"
      decoder_trainable: true
      model_weight_quantization: null
      optimizer: "adamw_torch"
    defaults:
      learning_rate: 2.0e-5
      weight_decay: 0.01
      freeze_encoder_bottom_n_layers: 16
      freeze_decoder_bottom_n_layers: 0
    search_space:
      learning_rate: [1.0e-5, 2.0e-5, 5.0e-5]
      weight_decay: [0.0, 0.01, 0.05]
      freeze_encoder_bottom_n_layers: [10, 16, 20, 24]
      freeze_decoder_bottom_n_layers: [0]

  lora_ft:
    description: "LoRA fine-tuning: baziniai svoriai užšaldomi, apmokomi tik LoRA adapteriai."
    fixed:
      peft_method: "LoRA"
      optimizer: "paged_adamw_8bit"
      model_weight_quantization: "8bit"
      target_modules_default: ["q_proj", "v_proj"]
    defaults:
      learning_rate: 1.0e-4
      lora_r: 16
      lora_alpha: 32
      lora_dropout: 0.05
      target_modules: ["q_proj", "v_proj"]
    search_space:
      learning_rate: [1.0e-5, 5.0e-5, 1.0e-4, 2.0e-4]
      weight_decay: [0.0, 0.01, 0.05]
      lora_r: [8, 16, 32, 64]
      lora_alpha: [16, 32, 64, 128]
      lora_dropout: [0.0, 0.05, 0.1, 0.15]
